name: Deploy to Hostinger

# Runs on every push to `main` (production).
#
# Hostinger hosts ONLY the production customer site + the backend API now —
# admin and vendor panels moved to Vercel to take load off Hostinger.
#
#   • deploy-customer → builds the customer SPA, rsyncs dist/ to Hostinger
#   • Backend API     → deployed by Hostinger's Node.js manager (no CI step)
#
# Admin / vendor (prod + all stage) and the stage customer site are deployed
# by Vercel from the `stage` / `main` branches — see DEPLOY.md.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   HOSTINGER_HOST       Hostinger server IP or hostname  (e.g. srv1749.hstgr.io)
#   HOSTINGER_USER       SSH username                     (e.g. u577205845)
#   HOSTINGER_SSH_KEY    Private SSH key content          (-----BEGIN ... KEY-----)
#   HOSTINGER_SSH_PORT   SSH port — Hostinger default is  65002
#   VITE_API_URL         Production API base URL          (https://api.autosahay.com/api)
#   CUSTOMER_DEPLOY_PATH Absolute path on server          (/home/u.../domains/<customer-domain>/public_html)

on:
  push:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Customer Site (static React build → rsync to Hostinger)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-customer:
    name: Customer Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build customer site
        working-directory: parking_space_frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Add Hostinger host to known_hosts
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy dist/ to Hostinger via rsync (with retry)
        env:
          REMOTE_PATH: ${{ secrets.CUSTOMER_DEPLOY_PATH }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          LOCAL_PATH:  parking_space_frontend/dist/
        run: |
          set -e
          SSH_OPTS="-p $REMOTE_PORT -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=3"
          for attempt in 1 2 3; do
            echo "── rsync attempt $attempt of 3 ──"
            if rsync -avzr --delete --checksum \
                -e "ssh $SSH_OPTS" \
                "$LOCAL_PATH" \
                "$REMOTE_USER@$REMOTE_HOST:$REMOTE_PATH/"; then
              echo "✔ rsync succeeded on attempt $attempt"
              exit 0
            fi
            echo "✘ rsync failed on attempt $attempt"
            if [ "$attempt" -lt 3 ]; then
              echo "Waiting 30s before retry…"
              sleep 30
            fi
          done
          echo "All rsync attempts failed"
          exit 1

  # Backend API is handled by Hostinger's Node.js manager — no CI job needed.
