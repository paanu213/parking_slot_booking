name: Deploy to Hostinger

# Runs on every push to main.
# Three independent jobs run in parallel:
#   1. deploy-admin   → builds React SPA, rsyncs dist/ to admin subdomain
#   2. deploy-vendor  → builds React SPA, rsyncs dist/ to vendor subdomain
#   3. deploy-backend → SSH into server: git pull → build → migrate → PM2 restart
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   HOSTINGER_HOST      Hostinger server IP or hostname  (e.g. srv1749.hstgr.io)
#   HOSTINGER_USER      SSH username                     (e.g. u577205845)
#   HOSTINGER_SSH_KEY   Private SSH key content          (-----BEGIN ... KEY-----)
#   HOSTINGER_SSH_PORT  SSH port — Hostinger default is  65002
#   VITE_API_URL        Production API base URL          (https://api.yourdomain.com/api)
#   ADMIN_DEPLOY_PATH   Absolute path on server          (/home/u.../domains/admin.domain.com/public_html)
#   VENDOR_DEPLOY_PATH  Absolute path on server          (/home/u.../domains/vendor.domain.com/public_html)
#   BACKEND_DEPLOY_PATH Absolute path to repo on server  (/home/u.../parking-api)

on:
  push:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Admin Panel (static React build → rsync to server)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-admin:
    name: Admin Panel
    runs-on: ubuntu-latest

    # Only re-deploy when relevant files change
    # (remove the paths filter if you always want a full deploy on any push)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build admin panel
        working-directory: parking_space_frontend_admin
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy dist/ to Hostinger via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --checksum
          path: parking_space_frontend_admin/dist/
          remote_path: ${{ secrets.ADMIN_DEPLOY_PATH }}
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key:  ${{ secrets.HOSTINGER_SSH_KEY }}
          remote_port: ${{ secrets.HOSTINGER_SSH_PORT }}

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Vendor Panel (static React build → rsync to server)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-vendor:
    name: Vendor Panel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build vendor panel
        working-directory: parking_space_frontend_vendor
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy dist/ to Hostinger via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --checksum
          path: parking_space_frontend_vendor/dist/
          remote_path: ${{ secrets.VENDOR_DEPLOY_PATH }}
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key:  ${{ secrets.HOSTINGER_SSH_KEY }}
          remote_port: ${{ secrets.HOSTINGER_SSH_PORT }}

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Backend API (SSH: git pull → npm build → prisma → PM2 restart)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-backend:
    name: Backend API
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key:      ${{ secrets.HOSTINGER_SSH_KEY }}
          port:     ${{ secrets.HOSTINGER_SSH_PORT }}
          # Exit immediately if any command fails
          script_stop: true
          script: |
            set -e

            # Load NVM so node/npm/npx are available in non-interactive SSH sessions
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            DEPLOY_DIR="${{ secrets.BACKEND_DEPLOY_PATH }}"

            echo "→ Pulling latest code from main..."
            cd "$DEPLOY_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "→ Installing dependencies..."
            npm install

            echo "→ Building TypeScript..."
            npm run build --workspace=parking_space_backend

            echo "→ Running Prisma generate..."
            cd parking_space_backend
            npx prisma generate
            npx prisma db push
            cd ..

            echo "→ Restarting API with PM2..."
            if npx pm2 describe parking-api > /dev/null 2>&1; then
              npx pm2 restart parking-api --update-env
            else
              npx pm2 start ecosystem.config.cjs
            fi
            npx pm2 save

            echo "✓ Backend deployed successfully"
